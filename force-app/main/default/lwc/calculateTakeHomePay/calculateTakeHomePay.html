<template>
    <lightning-card title="Take-Home Pay Calculator">
        <div class="slds-p-around_medium">

            <!-- Inputs -->
            <div class="slds-grid slds-gutters slds-wrap">
                <div class="slds-col slds-size_1-of-2">
                    <lightning-input
                        type="number"
                        label="Expected Pay"
                        value={expectedPay}
                        min="0"
                        formatter="decimal"
                        step="0.01"
                        onchange={handlePayChange}>
                    </lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <lightning-combobox
                        label="Pay Frequency"
                        value={frequency}
                        options={frequencyOptions}
                        onchange={handleFrequencyChange}>
                    </lightning-combobox>
                </div>
            </div>

            <!-- Results -->
            <template if:true={hasResults}>
                <div class="slds-m-top_large">

                    <!-- Gross Pay -->
                    <p class="slds-text-heading_small"><strong><u>Gross Pay</u></strong></p>
                    <div class="slds-m-left_medium slds-m-top_x-small">
                        <p>Yearly: <strong>{grossPay.yearly}</strong></p>
                        <p>Semi-Annually: <strong>{grossPay.semiAnnual}</strong></p>
                        <p>Monthly: <strong>{grossPay.monthly}</strong></p>
                        <p>Bi-Weekly: <strong>{grossPay.biWeekly}</strong></p>
                    </div>

                    <div class="slds-m-top_medium"></div>

                    <!-- Estimated Deductions -->
                    <p class="slds-text-heading_small"><strong><u>Estimated Deductions:</u></strong></p>
                    <div class="slds-m-left_medium slds-m-top_x-small">

                        <p class="slds-m-top_x-small"><strong>Yearly</strong></p>
                        <div class="slds-m-left_medium">
                            <p>Federal Income Tax: <strong>{deductions.yearly.federalTax}</strong></p>
                            <p>Social Security Withholdings: <strong>{deductions.yearly.socialSecurity}</strong></p>
                            <p>Medicare Withholdings: <strong>{deductions.yearly.medicare}</strong></p>
                            <p>Total Deductions: <strong>{deductions.yearly.total}</strong></p>
                        </div>

                        <p class="slds-m-top_x-small"><strong>Semi-Annually</strong></p>
                        <div class="slds-m-left_medium">
                            <p>Federal Income Tax: <strong>{deductions.semiAnnual.federalTax}</strong></p>
                            <p>Social Security Withholdings: <strong>{deductions.semiAnnual.socialSecurity}</strong></p>
                            <p>Medicare Withholdings: <strong>{deductions.semiAnnual.medicare}</strong></p>
                            <p>Total Deductions: <strong>{deductions.semiAnnual.total}</strong></p>
                        </div>

                        <p class="slds-m-top_x-small"><strong>Monthly</strong></p>
                        <div class="slds-m-left_medium">
                            <p>Federal Income Tax: <strong>{deductions.monthly.federalTax}</strong></p>
                            <p>Social Security Withholdings: <strong>{deductions.monthly.socialSecurity}</strong></p>
                            <p>Medicare Withholdings: <strong>{deductions.monthly.medicare}</strong></p>
                            <p>Total Deductions: <strong>{deductions.monthly.total}</strong></p>
                        </div>

                        <p class="slds-m-top_x-small"><strong>Bi-Weekly</strong></p>
                        <div class="slds-m-left_medium">
                            <p>Federal Income Tax: <strong>{deductions.biWeekly.federalTax}</strong></p>
                            <p>Social Security Withholdings: <strong>{deductions.biWeekly.socialSecurity}</strong></p>
                            <p>Medicare Withholdings: <strong>{deductions.biWeekly.medicare}</strong></p>
                            <p>Total Deductions: <strong>{deductions.biWeekly.total}</strong></p>
                        </div>

                    </div>

                    <div class="slds-m-top_medium"></div>

                    <!-- Estimated Take-Home Pay -->
                    <p class="slds-text-heading_small"><strong><u>Estimated Take-Home Pay</u></strong></p>
                    <div class="slds-m-left_medium slds-m-top_x-small">
                        <p>Yearly: <strong>{takeHomePay.yearly}</strong></p>
                        <p>Semi-Annually: <strong>{takeHomePay.semiAnnual}</strong></p>
                        <p>Monthly: <strong>{takeHomePay.monthly}</strong></p>
                        <p>Bi-Weekly: <strong>{takeHomePay.biWeekly}</strong></p>
                    </div>

                    <p class="slds-m-top_medium slds-text-color_weak slds-text-body_small">
                        * Federal tax estimate based on 2025 single-filer brackets. Results are estimates only.
                    </p>

                </div>
            </template>

            <template if:false={hasResults}>
                <div class="slds-m-top_large slds-text-align_center slds-text-color_weak">
                    Enter a wage and select a pay frequency to see calculations.
                </div>
            </template>

        </div>
    </lightning-card>
</template>
